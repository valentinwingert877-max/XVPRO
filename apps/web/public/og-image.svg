<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07090f"/>
      <stop offset="100%" style="stop-color:#0d1018"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0c0d11;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="xc"><rect x="80" y="195" width="120" height="160"/></clipPath>
    <clipPath id="vc"><rect x="220" y="195" width="220" height="160"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb -->
  <ellipse cx="600" cy="200" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Gold top bar -->
  <rect width="1200" height="4" fill="#D4A843"/>

  <!-- XVP LOGO — geometric -->
  <!-- X white -->
  <g clip-path="url(#xc)" stroke="white" stroke-width="22" stroke-linecap="butt" fill="none">
    <line x1="30" y1="130" x2="250" y2="430"/>
    <line x1="250" y1="130" x2="30" y2="430"/>
  </g>
  <!-- VP gold -->
  <g clip-path="url(#vc)" stroke="#D4A843" stroke-width="22" stroke-linecap="butt" stroke-linejoin="miter" fill="none">
    <path d="M 220 195 L 275 355 L 330 195"/>
    <line x1="330" y1="195" x2="330" y2="355"/>
    <path d="M 330 195 C 415 195 415 275 330 275"/>
  </g>

  <!-- XVPRO text -->
  <text x="470" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="white" letter-spacing="-2">XV<tspan fill="#D4A843">PRO</tspan></text>

  <!-- Tagline -->
  <text x="470" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">Analyse IA de matchs de rugby</text>

  <!-- Bottom badges -->
  <rect x="470" y="400" width="200" height="44" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="570" y="428" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">YOLO + Claude AI</text>

  <rect x="688" y="400" width="160" height="44" rx="22" fill="rgba(212,168,67,0.1)" stroke="rgba(212,168,67,0.3)" stroke-width="1"/>
  <text x="768" y="428" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#D4A843" text-anchor="middle" letter-spacing="1">Analyse en 30min</text>

  <!-- URL -->
  <text x="600" y="590" font-family="system-ui, sans-serif" font-size="20" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="2">xvpro.vercel.app</text>
</svg>